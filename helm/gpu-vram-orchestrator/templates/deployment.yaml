apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gpu-vram-orchestrator.fullname" . }}
  labels:
    {{- include "gpu-vram-orchestrator.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicas }}
  {{- end }}
  strategy:
    {{- toYaml .Values.strategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "gpu-vram-orchestrator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gpu-vram-orchestrator.selectorLabels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.prometheus.port }}"
    spec:
      serviceAccountName: {{ include "gpu-vram-orchestrator.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.securityContext | nindent 8 }}
      
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      
      {{- if .Values.initContainers }}
      initContainers:
        {{- toYaml .Values.initContainers | nindent 8 }}
      {{- end }}
      
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        
        ports:
        - name: http
          containerPort: {{ .Values.service.targetPort }}
          protocol: TCP
        - name: metrics
          containerPort: {{ .Values.prometheus.port }}
          protocol: TCP
        
        {{- if .Values.gpu.count }}
        resources:
          limits:
            {{- if .Values.gpu.type }}
            {{ .Values.gpu.type }}: {{ .Values.gpu.count }}
            {{- end }}
            memory: {{ .Values.resources.limits.memory }}
            cpu: {{ .Values.resources.limits.cpu }}
          requests:
            {{- if .Values.gpu.type }}
            {{ .Values.gpu.type }}: {{ .Values.gpu.count }}
            {{- end }}
            memory: {{ .Values.resources.requests.memory }}
            cpu: {{ .Values.resources.requests.cpu }}
        {{- else }}
        resources:
          limits:
            memory: {{ .Values.resources.limits.memory }}
            cpu: {{ .Values.resources.limits.cpu }}
          requests:
            memory: {{ .Values.resources.requests.memory }}
            cpu: {{ .Values.resources.requests.cpu }}
        {{- end }}
        
        livenessProbe:
          {{- toYaml .Values.livenessProbe | nindent 10 }}
        
        readinessProbe:
          {{- toYaml .Values.readinessProbe | nindent 10 }}
        
        env:
        - name: CACHE_SIZE_MB
          value: "{{ .Values.cache.size_mb }}"
        - name: RESERVED_MEMORY_MB
          value: "{{ .Values.cache.reserved_memory_mb }}"
        - name: SCHEDULER_MEMORY_WEIGHT
          value: "{{ .Values.scheduler.memory_weight }}"
        - name: SCHEDULER_LOAD_WEIGHT
          value: "{{ .Values.scheduler.load_weight }}"
        - name: SCHEDULER_AFFINITY_WEIGHT
          value: "{{ .Values.scheduler.affinity_weight }}"
        - name: SCHEDULER_WORKERS
          value: "{{ .Values.scheduler.workers }}"
        - name: PREDICTION_ENABLED
          value: "{{ .Values.predictor.enabled }}"
        - name: PREDICTION_WINDOW_HOURS
          value: "{{ .Values.predictor.window_hours }}"
        - name: PREDICTION_MIN_CONFIDENCE
          value: "{{ .Values.predictor.min_confidence }}"
        - name: PROMETHEUS_ENABLED
          value: "{{ .Values.prometheus.enabled }}"
        - name: LOG_LEVEL
          value: {{ .Values.logging.level }}
        {{- range $key, $value := .Values.env }}
        - name: {{ $key }}
          value: "{{ $value }}"
        {{- end }}
        
        {{- if .Values.persistence.enabled }}
        volumeMounts:
        - name: cache
          mountPath: {{ .Values.persistence.mountPath }}
        {{- end }}
        {{- range .Values.extraVolumeMounts }}
        - {{- toYaml . | nindent 10 }}
        {{- end }}
      
      {{- if .Values.sidecarContainers }}
      {{- toYaml .Values.sidecarContainers | nindent 6 }}
      {{- end }}
      
      {{- if .Values.persistence.enabled }}
      volumes:
      - name: cache
        persistentVolumeClaim:
          claimName: {{ include "gpu-vram-orchestrator.fullname" . }}-cache
      {{- end }}
      {{- range .Values.extraVolumes }}
      - {{- toYaml . | nindent 8 }}
      {{- end }}
