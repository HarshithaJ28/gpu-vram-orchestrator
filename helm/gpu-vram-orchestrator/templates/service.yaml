apiVersion: v1
kind: Service
metadata:
  name: {{ include "gpu-vram-orchestrator.fullname" . }}
  labels:
    {{- include "gpu-vram-orchestrator.labels" . | nindent 4 }}
  {{- if .Values.service.annotations }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.prometheus.port }}
      targetPort: metrics
      protocol: TCP
      name: metrics
  selector:
    {{- include "gpu-vram-orchestrator.selectorLabels" . | nindent 4 }}
