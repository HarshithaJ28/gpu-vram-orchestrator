{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "gpu-vram-orchestrator.fullname" . }}
  labels:
    {{- include "gpu-vram-orchestrator.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      {{- include "gpu-vram-orchestrator.selectorLabels" . | nindent 6 }}
{{- end }}
