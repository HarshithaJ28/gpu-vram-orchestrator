apiVersion: v1
kind: Secret
metadata:
  name: modelmesh-secrets
  namespace: default
  labels:
    app: modelmesh
    component: security
type: Opaque
data:
  # Base64 encoded API key (example: "mk_prod_key_change_me)
  # To set your own: echo -n "mk_your_key_here" | base64
  api-key: bWtfcHJvZF9rZXlfY2hhbmdlX21lCg==

---
apiVersion: v1
kind: Secret
metadata:
  name: modelmesh-docker-credentials
  namespace: default
  labels:
    app: modelmesh
    component: registry
type: kubernetes.io/dockercfg
data:
  # Docker registry credentials (if using private registry)
  # Format: {"auths":{"registry.example.com":{"auth":"base64_encoded_credentials"}}}
  .dockercfg: eyJhdXRocyI6e319Cg==

---
apiVersion: v1
kind: Secret
metadata:
  name: modelmesh-tls
  namespace: default
  labels:
    app: modelmesh
    component: tls
