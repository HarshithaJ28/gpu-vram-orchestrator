apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: modelmesh-models-pvc
  namespace: default
  labels:
    app: modelmesh
    component: storage
spec:
  accessModes:
    - ReadWriteMany  # Multiple pods can read/write
  storageClassName: fast-ssd  # Use fast SSD storage class
  resources:
    requests:
      storage: 500Gi  # 500 GB for model storage

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: modelmesh-cache-pvc
  namespace: default
  labels:
    app: modelmesh
    component: storage
spec:
  accessModes:
    - ReadWriteOnce  # Single pod access
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi  # 100 GB for cache

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast-ssd
  labels:
    app: modelmesh
    component: storage
provisioner: csi.vsphere.vmware.com  # For vSphere; adjust for your cloud provider
allowVolumeExpansion: true
parameters:
  # GCP: pd-ssd
  # AWS: gp3
  # Azure: Premium_LRS
  storagepolicyname: "fast-ssd"
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Delete

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: modelmesh-models-pv
  labels:
    app: modelmesh
    component: storage
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  nfs:
    server: 192.168.1.100  # NFS server IP - UPDATE THIS
    path: "/models"
  allowVolumeExpansion: true

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: modelmesh-cache-pv
  labels:
    app: modelmesh
    component: storage
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: fast-ssd
  hostPath:
    path: /data/modelmesh-cache
    type: Directory
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nvidia.com/gpu
          operator: In
          values:
          - "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: modelmesh-storage-config
  namespace: default
  labels:
    app: modelmesh
    component: storage
data:
  # Storage configuration
  models_dir: "/app/models"
  cache_dir: "/var/cache/models"
  logs_dir: "/app/logs"
  
  # Retention policy
  log_retention_days: "30"
  cache_cleanup_interval_hours: "24"
  cache_cleanup_threshold_pct: "80"  # Clean when 80% full
