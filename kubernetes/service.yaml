apiVersion: v1
kind: Service
metadata:
  name: gpu-vram-orchestrator
  namespace: default
  labels:
    app: gpu-vram-orchestrator
spec:
  type: ClusterIP
  selector:
    app: gpu-vram-orchestrator
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 8000
    targetPort: metrics
    protocol: TCP
  sessionAffinity: None

---
apiVersion: v1
kind: Service
metadata:
  name: gpu-vram-orchestrator-nodeport
  namespace: default
  labels:
    app: gpu-vram-orchestrator
spec:
  type: NodePort
  selector:
    app: gpu-vram-orchestrator
  ports:
  - name: http
    port: 80
    targetPort: http
    nodePort: 30080
    protocol: TCP

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: gpu-vram-orchestrator-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gpu-vram-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: gpu-vram-orchestrator-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: gpu-vram-orchestrator
