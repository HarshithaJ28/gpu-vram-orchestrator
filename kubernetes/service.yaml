apiVersion: v1
kind: Service
metadata:
  name: modelmesh
  namespace: default
  labels:
    app: modelmesh
    component: inference
  annotations:
    service.alpha.kubernetes.io/app-protocols: '{"http":"HTTP"}'
spec:
  type: ClusterIP
  selector:
    app: modelmesh
  ports:
  - name: http
    port: 8000
    targetPort: http
    protocol: TCP
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 3600

---
apiVersion: v1
kind: Service
metadata:
  name: modelmesh-nodeport
  namespace: default
  labels:
    app: modelmesh
spec:
  type: NodePort
  selector:
    app: modelmesh
  ports:
  - name: http
    port: 8000
    targetPort: http
    nodePort: 30080
    protocol: TCP

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: modelmesh-pdb
  namespace: default
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: modelmesh

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: modelmesh-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: modelmesh
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max
